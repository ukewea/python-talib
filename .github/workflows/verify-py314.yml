# Fast path: build + smoke Python 3.14 only (TA-Lib 0.7.x + ACCBANDS/AVGDEV/IMI).
# Same line workflow as the full matrix; toggles for arches/manifest.
name: Verify Python 3.14

on:
  workflow_dispatch:
    inputs:
      include_arm64:
        description: Build/smoke linux/arm64 (self-hosted arm64-native)
        type: boolean
        default: true
      include_armv7:
        description: Build/smoke linux/arm/v7 (armhf-delegate + ARMHF_DOCKER_HOST)
        type: boolean
        default: true
      create_manifest:
        description: Create multi-arch manifest after successful arch builds
        type: boolean
        default: false

jobs:
  # Keep py314 pins aligned with make-multi-arch-image.yml matrix (py314 cell).
  build-line:
    uses: ./.github/workflows/build-python-line.yaml
    with:
      image_name: ghcr.io/${{ github.repository }}_single-arch-py314
      base_image: ubuntu:26.04
      expected_python: "3.14"
      python_version: python3.14
      include_arm64: ${{ inputs.include_arm64 }}
      include_armv7: ${{ inputs.include_armv7 }}
      create_manifest: ${{ inputs.create_manifest }}
