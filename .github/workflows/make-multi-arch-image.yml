# Full product matrix: one job per Python line (arches + manifest live in build-python-line.yaml).
# Line pins (base_image / expected_python) — only place to edit when adding a version.
name: Build, Multi-Arch Image

on:
  # push:
  #   branches:
  #     - main
  schedule:
    - cron: '0 0 15 */2 *'
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.set_output.outputs.image_name }}
    steps:
      - name: Set the Image Name
        id: set_output
        run: echo "image_name=ghcr.io/${{ github.repository }}_single-arch" >> "$GITHUB_OUTPUT"

  # Matrix cells must stay in sync with Dockerfile Python↔base expectations.
  build-line:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: py312
            base_image: ubuntu:24.04
            expected_python: "3.12"
            python_version: python3.12
          - suffix: py313
            base_image: ubuntu:25.10
            expected_python: "3.13"
            python_version: python3.13
          - suffix: py314
            base_image: ubuntu:26.04
            expected_python: "3.14"
            python_version: python3.14
    uses: ./.github/workflows/build-python-line.yaml
    with:
      image_name: ${{ needs.setup.outputs.image_name }}-${{ matrix.suffix }}
      base_image: ${{ matrix.base_image }}
      expected_python: ${{ matrix.expected_python }}
      python_version: ${{ matrix.python_version }}
