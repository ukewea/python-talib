name: Build Image

on:
  workflow_call:
    inputs:
      images:
        description: Passed to docker/metadata-action
        type: string
        required: true
      context:
        description: Passed to docker/build-push-action
        type: string
        required: true
      platforms:
        description: Passed to docker/build-push-action
        type: string
        required: true
      runner-labels:
        description: Runner labels
        type: string
        required: true
      base_image:
        description: Base image for Docker build
        type: string
        required: false
        default: "ubuntu:24.04"
      expected_python:
        description: Expected Python major.minor in the image (e.g. "3.12", "3.13"). Checked in smoke test.
        type: string
        required: true
      docker_host:
        description: Optional DOCKER_HOST (ssh://… to a remote daemon). Empty = local daemon on the runner. Prefer a repo variable, never commit real hosts.
        type: string
        required: false
        default: ""
    outputs:
      digest:
        description: digest
        value: ${{ jobs.build.outputs.digest }}

jobs:
  build:
    runs-on: ${{ fromJson(inputs.runner-labels) }}

    permissions:
      packages: write

    timeout-minutes: 300

    # When set, all docker/buildx steps talk to a remote daemon (e.g. native armhf via SSH).
    # Job-scoped: does not affect other jobs on the same self-hosted runner.
    # Value comes from caller (typically vars.ARMHF_DOCKER_HOST); do not log it.
    env:
      DOCKER_HOST: ${{ inputs.docker_host }}

    outputs:
      digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify remote Docker over SSH
        if: inputs.docker_host != ''
        run: |
          set -euo pipefail
          echo "DOCKER_HOST is set (value not logged)"
          docker version
          arch="$(docker info --format '{{.Architecture}}')"
          echo "Remote daemon architecture: ${arch}"
          case "${arch}" in
            arm|armv7*|armhf) echo "Remote armhf daemon OK" ;;
            *)
              echo "Expected arm/armv7l daemon for native arm/v7 builds, got: ${arch}"
              exit 1
              ;;
          esac

      # Skip QEMU when building on a native remote host (e.g. armhf via DOCKER_HOST).
      - name: Set up QEMU
        if: inputs.docker_host == ''
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use the engine pointed at by DOCKER_HOST (local or remote) directly.
          # docker driver keeps builds on that daemon (native armhf when DOCKER_HOST is set).
          driver: docker

      # Fail fast: prove GHCR auth works on this DOCKER_HOST before a long build.
      # logout: false so we control logout immediately (do not leave creds for the compile).
      - name: Probe GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: false

      - name: Logout after GHCR probe
        run: docker logout ghcr.io

      # Tags/labels only; no registry auth required.
      - name: Docker meta
        uses: docker/metadata-action@v5
        id: metadata
        with:
          images: ${{ inputs.images }}
          # avoid overwriting the latest tag because metadata-action does not add a suffix to it
          flavor: latest=false

      - name: Build (no push yet)
        id: build-image
        uses: docker/build-push-action@v5
        with:
          push: false
          load: true
          context: ${{ inputs.context }}
          tags: temp-image:localtest
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: ${{ inputs.platforms }}
          build-args: |
            BASE_IMAGE=${{ inputs.base_image }}

      - name: Smoke Test - Python version, ta-lib, numpy, pandas
        env:
          EXPECTED_PYTHON: ${{ inputs.expected_python }}
        run: |
          docker run --rm -e EXPECTED_PYTHON="${EXPECTED_PYTHON}" temp-image:localtest /venv/bin/python -c "
          import os, sys
          print('Python:', sys.version)
          majmin = f'{sys.version_info.major}.{sys.version_info.minor}'
          expected = os.environ['EXPECTED_PYTHON'].strip()
          assert majmin == expected, f'expected Python {expected}, got {majmin}'
          print(f'Python version OK: {majmin}')
          import pandas as pd
          import talib
          import numpy as np
          ok = talib.SMA(np.array([1, 2, 3], dtype=float), timeperiod=2) is not None
          print('All good!' if ok else \"Something's missing\")
          raise SystemExit(0 if ok else 1)
          "

      # Fresh login immediately before push (long builds + shared remote Docker auth races).
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          push: true
          context: ${{ inputs.context }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: ${{ inputs.platforms }}
          build-args: |
            BASE_IMAGE=${{ inputs.base_image }}

      - name: Print the Image Digest
        run: echo "The image digest is ${{ steps.build-push.outputs.digest }}"

      - name: Remove local test image
        if: ${{ always() }}
        run: docker rmi temp-image:localtest || true
