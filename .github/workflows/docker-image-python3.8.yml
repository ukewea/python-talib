name: Build and Push Docker Image (Python 3.8)

on:
  push:
    branches:
      - main

permissions:
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Get the repository's code
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Define the base image variable
      - name: Define BASE_IMAGE
        run: echo "BASE_IMAGE=ubuntu:20.04" >> $GITHUB_ENV

      # Define the Python version variable
      - name: Define PYTHON_VERSION
        run: echo "PYTHON_VERSION=python3.8" >> $GITHUB_ENV

      # Generate the current date in YYYYMMDD format
      - name: Get the current date
        run: echo "CURRENT_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      # Define the Docker image tag, removing ":" from the BASE_IMAGE
      - name: Define Docker Image Tag
        run: |
          CLEANED_BASE_IMAGE="${BASE_IMAGE//:}"
          echo "DOCKER_IMAGE_TAG=${CLEANED_BASE_IMAGE}-${PYTHON_VERSION}-${CURRENT_DATE}" >> $GITHUB_ENV

      - name: Docker meta
        id: meta_id
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ env.DOCKER_IMAGE_TAG }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile-no-venv
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ghcr.io/${{ github.repository }}:${{ env.DOCKER_IMAGE_TAG }}
